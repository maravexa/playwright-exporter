run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - goconst
    - gofmt
    - goimports
    - misspell
    - unparam
    - prealloc

linters-settings:
  govet:
    enable-all: true
  gosec:
    excludes:
      - G204  # We intentionally exec subprocesses
